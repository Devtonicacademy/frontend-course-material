<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* GRID COLUMNS */
      .container {
        display: grid;
        grid-template-columns: auto auto auto auto;
        gap: 20px 1px;
        background-color: blue;
        padding: 20px;
        justify-content: space-between;
      }

      .container > div {
        border: 2px solid black;
        padding: 20px;
        font-size: 30px;
        text-align: center;
        background-color: lightblue;
      }
    </style>
  </head>
  <body>
    <h1>CSS GRID</h1>
    <div class="container">
      <div class="item1">1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>7</div>
      <div>8</div>
    </div>
  </body>
</html>

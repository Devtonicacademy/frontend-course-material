
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid Layout Website</title>
  <link rel="stylesheet" href="iv class="container">
  <style>
    
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background-color: #f4f4f4;
}

.container {
  display: grid;
  grid-template-areas:
    "header header"
    "nav main"
    "nav aside"
    "footer footer";
  grid-template-columns: 1fr 3fr;
 -template-rows: auto 1fr 1fr auto;
  gap: 20px;
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

header {
  grid-area: header;
  background-color: #6200ea;
  color: white;
  padding: 20px;
  font-size: 2em;
  text-align: center;
  border-radius: 10px;
}

nav {
  grid-area: nav;
  background-color: #bb86fc;
  padding: 20px;
  border-radius: 10px;
}

nav ul {
  list-style: none;
  padding: 0;
}

nav ul li {
  margin-bottom: 10px;
}

nav ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

main {
  grid-area: main;
  background-color: #ffffff;
  padding: 20px;
  border-radius: 10px;
}

aside {
  grid-area: aside;
  background-color: #eeeeee;
  padding: 20px;
  border-radius: 10px;
}

footer {
  grid-area: footer;
  background-color: #6200ea;
  color: white;
  text-align: center;
  padding: 10px;
  border-radius: 10px;
}

  </style>
  </head>
    <header>My Cool Website</header>
    <nav>
      <ul>
        <li>#Home</a></li>
        <li>#About</a></li>
        <li>#Projects</a></li>
        <li>#Contact</a></li>
      </ul>
    </nav>
    <main>
      <h2>Welcome!</h2>
      <p>This is a modern layout using CSS Grid. You can easily organize content into sections like this.</p>
    </main>
    <aside>
      <h3>Sidebar</h3>
      <p>Useful links, ads, or extra content can go here.</p>
    </aside>
    <footer>
      &copy; 2025 Elvis Eyobor. All rights reserved.
    </footer>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      input[type] {
        border: 2px solid gray;
        padding: 5px;
        border-radius: 20px;
      }
      input[placeholder] {
        color: red;
      }
      input::placeholder {
        color: gray;
      }
      a,
      input {
        display: block;
      }
    </style>
  </head>
  <body>
    <h2>Attribute Selectors</h2>

    <input type="text" placeholder="Enter name" autocomplete="Elvsvsdncksc" />
    <input type="password" placeholder="Enter password" />

    <a href="https://google.com">Go to google</a>
    <a href="https://jumia.com">Go to jumia</a>
  </body>
</html>

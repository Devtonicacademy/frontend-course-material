<!DOCTYPE html>
<html>
  <head>
    <style>
      .flex-container {
        display: flex;
        align-items: stretch;
        background-color: hsl(0, 0%, 95%);
        height: 300px;
      }

      .flex-container > div {
        background-color: DodgerBlue;
        color: white;
        margin: 10px;
        text-align: center;
        line-height: 75px;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <h1>The flex-grow Property</h1>

    <p>
      Make the third flex item grow eight times faster than the other flex
      items:
    </p>

    <div class="flex-container">
      <div style="flex-grow: 1">1</div>
      <div style="flex-shrink: 0">2</div>
      <!-- Prevent resizing -->

      <div style="flex-grow: 6">3</div>
      <div style="flex-basis: 100px; align-self: flex-start">4</div>
      <!-- Prevent resizing -->
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        font-family: "Times New Roman", Times, serif;
        border-collapse: collapse;
        width: 100%;
      }

      td,
      th {
        border: 1px solid #ddd;
        text-align: left;
        padding: 8px;
      }
      tr:nth-child(odd) {
        background-color: #ddd;
      }
    </style>
  </head>
  <body>
    <h1>HTML TABLES</h1>
    <table>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>City</th>
      </tr>

      <tr>
        <td>John</td>
        <td>30</td>
        <td>New York</td>
      </tr>
      <tr>
        <td>Mary</td>
        <td>25</td>
        <td>Chicago</td>
      </tr>
      <tr>
        <td>ARIF</td>
        <td>9</td>
        <td>Lagos</td>
      </tr>
      <tr>
        <td>Favour</td>
        <td>18</td>
        <td>Delta</td>
      </tr>
    </table>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- HTML FORMS -->
    <h2>HTML FORMS</h2>

    <form>
      <!-- Basic text input -->
      <label for="fname">First Name:</label>
      <input type="text" id="fname" name="fname" required /><br /><br />

      <!-- Last name -->
      <label for="lname">Last Name:</label>
      <input type="text" id="lname" name="lname" required /><br /><br />

      <!-- Email input -->
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" /><br /><br />

      <!-- Phone number input -->
      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="phone" /><br /><br />

      <!-- Password input -->
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" /><br /><br />

      <!-- Search input -->
      <label for="search">Search:</label>
      <input type="search" id="search" name="search" /><br /><br />

      <!-- Search input -->
      <label for="date">DOB:</label>
      <input type="datetime-local" id="search" name="search" /><br /><br />

      <!-- URL input -->
      <label for="website">Website:</label>
      <input type="url" id="website" name="website" required /><br /><br />

      <!-- URL input -->
      <label for="range">range:</label>
      <input type="range" id="range" name="range" required /><br /><br />

      <!-- URL input -->
      <label for="month">month:</label>
      <input type="month" id="month" name="month" required /><br /><br />

      <!-- radio -->
      <label for="radio">radio:</label>
      <label><input type="radio" />Male</label>
      <label><input type="radio" />Female</label>

      <br />
      <br />

      <!-- Select -->
      <label for="select">Select Dropdown</label>
      <select name="select" id="select">
        <option value="">Option A</option>
        <option value="">Option B</option>
        <option value="">Option C</option>
      </select>

      <br />
      <br />

      <!-- Checkbox -->

      <label for="checkbox">Remember me</label>
      <input type="checkbox" id="checkbox" name="checkbox" />

      <br />
      <br />

      <!-- Text Area -->
      <label for="message">Message:</label>
      <textarea id="message" name="message"></textarea>

      <br />
      <br />
      <br />
      <br />
      <br />
      <br />

      <!-- Submit button -->
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
